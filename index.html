<!DOCTYPE html>
<html>
<head>
    <title>Islamic Trivia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Islamic Trivia</h1>

    <!-- Category selection -->
    <div id="menu">
        <button onclick="startGame('history')">History</button>
        <button onclick="startGame('geography')">Geography</button>
    </div>

    <!-- Game screen -->
    <div id="game" style="display:none;">
        <h2 id="questionNumber"></h2>

        <p id="questionText"></p>

        <!-- Fix 1: replaced text input + submitAnswer() with a choices div
             that script.js populates with multiple-choice buttons -->
        <div id="choices"></div>

        <p id="feedback"></p>

        <p>Score: <span id="score">0</span></p>
    </div>

    <!-- Results screen (replaces nuking #game with innerHTML) -->
    <div id="results" style="display:none;">
        <h2>Quiz Complete!</h2>

        <p id="finalScore"></p>

        <h3>Missed Questions</h3>
        <div id="wrongAnswers"></div>

        <button onclick="location.reload()">Play Again</button>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
