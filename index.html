<!DOCTYPE html>
<html>
<head>
    <title>Islamic Trivia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Welcome To Islamic Trivia!</h1>

    <!-- Category selection -->
    <h3>Choose a Category</h3>
  
    <div id="menu">
        <button onclick="startGame('history')">History</button>
        <button onclick="startGame('geography')">Other</button>
    </div>
  
    <div style="text-align: center;">
      <img src="main.jpg" style="width: 700px; height: 500px;">
    </div>

    <!-- Game screen -->
    <div id="game" style="display:none;">

        <!-- Progress bar -->
        <div id="progressBarContainer">
            <div id="progressBar"></div>
        </div>

        <h2 id="questionNumber"></h2>

        <!-- Question image -->
        <img id="questionImage" src="" alt="Question image">

        <p id="questionText"></p>

        <div id="choices"></div>

        <p id="feedback"></p>

        <p>Score: <span id="score">0</span></p>
    </div>

    <!-- Results screen -->
    <div id="results" style="display:none;">
        <h2>Quiz Complete!</h2>

        <p id="finalScore"></p>

        <h3>Missed Questions</h3>
        <div id="wrongAnswers"></div>

        <button onclick="location.reload()">Play Again</button>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
